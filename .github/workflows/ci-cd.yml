name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - 2026-03-15-qsm b

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Setup Node (Frontend)
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      # 3. Build Frontend
      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build

      # 4. Setup Java (Backend)
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      # 5. Build Backend
      - name: Build Backend
        run: |
          cd backend
          ./mvnw clean package -DskipTests

      # 6. Build Docker images
      - name: Build Docker images
        run: docker compose build